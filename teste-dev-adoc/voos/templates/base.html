<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Flight Reservation System{% endblock %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f4f6f8; color: #333; }
        nav { background: #1a1a2e; padding: 1rem 2rem; display: flex; gap: 2rem; align-items: center; }
        nav a { color: #fff; text-decoration: none; font-size: 0.95rem; }
        nav a:hover { color: #e94560; }
        nav .brand { font-size: 1.2rem; font-weight: bold; color: #e94560; margin-right: auto; }
        .container { max-width: 1000px; margin: 2rem auto; padding: 0 1rem; }
        h1 { margin-bottom: 1.5rem; font-size: 1.5rem; }
        table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
        th { background: #1a1a2e; color: #fff; padding: 0.75rem 1rem; text-align: left; }
        td { padding: 0.75rem 1rem; border-bottom: 1px solid #eee; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #f9f9f9; }
        .btn { display: inline-block; padding: 0.5rem 1rem; border-radius: 6px; text-decoration: none; font-size: 0.9rem; border: none; cursor: pointer; }
        .btn-primary { background: #1a1a2e; color: #fff; }
        .btn-primary:hover { background: #e94560; }
        .btn-warning { background: #f0a500; color: #fff; }
        .btn-warning:hover { background: #c87d00; }
        .btn-danger { background: #e94560; color: #fff; }
        .btn-danger:hover { background: #c0304e; }
        .btn-secondary { background: #aaa; color: #fff; }
        .btn-secondary:hover { background: #888; }
        .actions { display: flex; gap: 0.5rem; }
        .card { background: #fff; border-radius: 8px; padding: 2rem; box-shadow: 0 1px 4px rgba(0,0,0,0.1); max-width: 500px; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.3rem; font-weight: bold; font-size: 0.9rem; }
        .form-group input, .form-group select { width: 100%; padding: 0.5rem; border: 1px solid #ccc; border-radius: 6px; font-size: 0.95rem; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: #1a1a2e; }
        .errorlist { color: #e94560; font-size: 0.85rem; margin-top: 0.3rem; list-style: none; }
        .messages { margin-bottom: 1rem; }
        .message { padding: 0.75rem 1rem; border-radius: 6px; margin-bottom: 0.5rem; }
        .message.success { background: #d4edda; color: #155724; }
        .message.error { background: #f8d7da; color: #721c24; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        .detail-card { background: #fff; border-radius: 8px; padding: 2rem; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
        .detail-row { display: flex; padding: 0.6rem 0; border-bottom: 1px solid #eee; }
        .detail-row:last-child { border-bottom: none; }
        .detail-label { font-weight: bold; width: 200px; color: #555; }
        .badge { display: inline-block; padding: 0.25rem 0.6rem; border-radius: 20px; font-size: 0.8rem; }
        .badge-active { background: #d4edda; color: #155724; }
        .badge-cancelled { background: #f8d7da; color: #721c24; }
        .confirm-box { background: #fff; border-radius: 8px; padding: 2rem; box-shadow: 0 1px 4px rgba(0,0,0,0.1); max-width: 500px; }
        .confirm-box p { margin-bottom: 1.5rem; }
        .confirm-actions { display: flex; gap: 1rem; }
    </style>
</head>
<body>
    <nav>
        <span class="brand">✈ Flight System</span>
        <a href="{% url 'airplane-list' %}">Airplanes</a>
        <a href="{% url 'flight-list' %}">Flights</a>
        <a href="{% url 'client-list' %}">Clients</a>
        <a href="{% url 'reservation-list' %}">Reservations</a>
    </nav>
    <div class="container">
        {% if messages %}
        <div class="messages">
            {% for message in messages %}
            <div class="message {{ message.tags }}">{{ message }}</div>
            {% endfor %}
        </div>
        {% endif %}
        {% block content %}{% endblock %}
    </div>
</body>
</html>

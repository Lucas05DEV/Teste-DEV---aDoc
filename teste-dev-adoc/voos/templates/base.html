<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Flight System{% endblock %}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: #f5f5f5; color: #333; }
        nav { background: #1a1a2e; padding: 1rem 2rem; display: flex; gap: 1.5rem; align-items: center; }
        nav a { color: #fff; text-decoration: none; font-size: 0.95rem; }
        nav a:hover { color: #a0c4ff; }
        nav .brand { font-weight: bold; font-size: 1.1rem; margin-right: 1rem; color: #a0c4ff; }
        nav .spacer { flex: 1; }
        nav .user-info { color: #ccc; font-size: 0.88rem; }
        nav .btn-logout { background: #e63946; color: #fff; padding: 0.3rem 0.85rem; border-radius: 6px; font-size: 0.85rem; text-decoration: none; }
        nav .btn-logout:hover { background: #c1121f; }
        .container { max-width: 960px; margin: 2rem auto; padding: 0 1rem; }
        .card { background: #fff; border-radius: 8px; padding: 1.5rem; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
        h1 { font-size: 1.4rem; margin-bottom: 1.2rem; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 0.75rem 1rem; text-align: left; border-bottom: 1px solid #eee; font-size: 0.95rem; }
        th { background: #f0f0f0; font-weight: 600; }
        tr:hover td { background: #fafafa; }
        .btn { display: inline-block; padding: 0.45rem 1rem; border-radius: 6px; font-size: 0.88rem; text-decoration: none; border: none; cursor: pointer; }
        .btn-primary { background: #1a1a2e; color: #fff; }
        .btn-primary:hover { background: #16213e; }
        .btn-warning { background: #f0a500; color: #fff; }
        .btn-warning:hover { background: #d4920a; }
        .btn-danger { background: #e63946; color: #fff; }
        .btn-danger:hover { background: #c1121f; }
        .btn-secondary { background: #6c757d; color: #fff; }
        .btn-secondary:hover { background: #5a6268; }
        .actions { display: flex; gap: 0.5rem; }
        form label { display: block; margin-bottom: 0.3rem; font-size: 0.9rem; font-weight: 500; }
        form input, form select { width: 100%; padding: 0.5rem 0.75rem; border: 1px solid #ccc; border-radius: 6px; font-size: 0.95rem; margin-bottom: 1rem; }
        form input:focus, form select:focus { outline: none; border-color: #1a1a2e; }
        .form-actions { display: flex; gap: 0.75rem; margin-top: 0.5rem; }
        .messages { margin-bottom: 1rem; }
        .messages li { list-style: none; padding: 0.75rem 1rem; border-radius: 6px; background: #d4edda; color: #155724; margin-bottom: 0.5rem; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.2rem; }
        .empty { color: #888; font-size: 0.95rem; padding: 1rem 0; }
        .badge { display: inline-block; padding: 0.2rem 0.6rem; border-radius: 20px; font-size: 0.8rem; font-weight: 500; }
        .badge-active { background: #d4edda; color: #155724; }
        .badge-cancelled { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <nav>
        <span class="brand">✈ Flight System</span>
        <a href="{% url 'flight-list' %}">Flights</a>
        {% if user.is_staff %}
        <a href="{% url 'airplane-list' %}">Airplanes</a>
        <a href="{% url 'client-list' %}">Clients</a>
        <a href="{% url 'reservation-list' %}">Reservations</a>
        {% endif %}
        <span class="spacer"></span>
        <span class="user-info">{{ user.username }}</span>
        <form method="post" action="{% url 'logout' %}" style="margin:0">
            {% csrf_token %}
            <button type="submit" class="btn-logout">Logout</button>
        </form>
    </nav>
    <div class="container">
        {% if messages %}
        <ul class="messages">
            {% for message in messages %}
            <li>{{ message }}</li>
            {% endfor %}
        </ul>
        {% endif %}
        {% block content %}{% endblock %}
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Flight System</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: #f5f5f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .card { background: #fff; border-radius: 12px; padding: 2.5rem 2rem; box-shadow: 0 2px 12px rgba(0,0,0,0.1); width: 100%; max-width: 380px; }
        .brand { text-align: center; margin-bottom: 2rem; }
        .brand span { font-size: 1.5rem; font-weight: bold; color: #1a1a2e; }
        .brand p { color: #888; font-size: 0.9rem; margin-top: 0.3rem; }
        label { display: block; font-size: 0.88rem; font-weight: 500; margin-bottom: 0.3rem; color: #444; }
        input { width: 100%; padding: 0.6rem 0.85rem; border: 1px solid #ddd; border-radius: 8px; font-size: 0.95rem; margin-bottom: 1.1rem; }
        input:focus { outline: none; border-color: #1a1a2e; }
        button { width: 100%; padding: 0.7rem; background: #1a1a2e; color: #fff; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; margin-top: 0.3rem; }
        button:hover { background: #16213e; }
        .errors { background: #fdecea; border: 1px solid #f5c6c6; border-radius: 8px; padding: 0.75rem 1rem; margin-bottom: 1rem; color: #a94442; font-size: 0.88rem; }
    </style>
</head>
<body>
    <div class="card">
        <div class="brand">
            <span>✈ Flight System</span>
            <p>Sign in to continue</p>
        </div>
        {% if form.errors %}
        <div class="errors">Invalid username or password.</div>
        {% endif %}
        <form method="post">
            {% csrf_token %}
            <label for="id_username">Username</label>
            <input type="text" name="username" id="id_username" autofocus>
            <label for="id_password">Password</label>
            <input type="password" name="password" id="id_password">
            <button type="submit">Sign in</button>
        </form>
        <div class="login-link" style="text-align:center;margin-top:1rem;font-size:0.88rem;color:#888;">
            Don't have an account? <a href="{% url 'register' %}" style="color:#1a1a2e;font-weight:500;">Create account</a>
        </div>
    </div>
</body>
</html>
